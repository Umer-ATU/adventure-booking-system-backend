name: Terraform Infrastructure

on:
  # Manual trigger only — apply, plan-only, or destroy
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - plan-only
          - destroy

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'apply' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    env:
      TF_VAR_FILE: |
        -var="public_key=${{ secrets.EC2_PUBLIC_KEY }}"
        -var="mongodb_url=${{ secrets.MONGODB_URL }}"
        -var="secret_key=${{ secrets.SECRET_KEY }}"
        -var="stripe_secret_key=${{ secrets.STRIPE_SECRET_KEY }}"
        -var="stripe_publishable_key=${{ secrets.STRIPE_PUBLISHABLE_KEY }}"
        -var="stripe_webhook_secret=${{ secrets.STRIPE_WEBHOOK_SECRET }}"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.7'

      - name: Determine action
        id: action
        run: |
          # Default to 'apply' for push events, otherwise use the input
          ACTION="${{ github.event.inputs.action || 'apply' }}"
          echo "action=$ACTION" >> $GITHUB_OUTPUT
          echo "🎯 Terraform action: $ACTION"

      - name: Terraform Init
        run: terraform init

      # ────────────────────────────────────────────────────────────
      # PLAN (for apply or plan-only)
      # ────────────────────────────────────────────────────────────
      - name: Terraform Plan
        if: steps.action.outputs.action != 'destroy'
        run: |
          terraform plan \
            -var="public_key=${{ secrets.EC2_PUBLIC_KEY }}" \
            -var="mongodb_url=${{ secrets.MONGODB_URL }}" \
            -var="secret_key=${{ secrets.SECRET_KEY }}" \
            -var="stripe_secret_key=${{ secrets.STRIPE_SECRET_KEY }}" \
            -var="stripe_publishable_key=${{ secrets.STRIPE_PUBLISHABLE_KEY }}" \
            -var="stripe_webhook_secret=${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            -out=tfplan

      # ────────────────────────────────────────────────────────────
      # APPLY (only on 'apply' or auto push)
      # ────────────────────────────────────────────────────────────
      - name: Terraform Apply
        if: steps.action.outputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      # ────────────────────────────────────────────────────────────
      # DESTROY PLAN (show what will be destroyed before doing it)
      # ────────────────────────────────────────────────────────────
      - name: Terraform Destroy Plan
        if: steps.action.outputs.action == 'destroy'
        run: |
          terraform plan -destroy \
            -var="public_key=${{ secrets.EC2_PUBLIC_KEY }}" \
            -var="mongodb_url=${{ secrets.MONGODB_URL }}" \
            -var="secret_key=${{ secrets.SECRET_KEY }}" \
            -var="stripe_secret_key=${{ secrets.STRIPE_SECRET_KEY }}" \
            -var="stripe_publishable_key=${{ secrets.STRIPE_PUBLISHABLE_KEY }}" \
            -var="stripe_webhook_secret=${{ secrets.STRIPE_WEBHOOK_SECRET }}"

      # ────────────────────────────────────────────────────────────
      # DESTROY (manual only — never auto-triggered)
      # ────────────────────────────────────────────────────────────
      - name: Terraform Destroy
        if: steps.action.outputs.action == 'destroy'
        run: |
          terraform destroy -auto-approve \
            -var="public_key=${{ secrets.EC2_PUBLIC_KEY }}" \
            -var="mongodb_url=${{ secrets.MONGODB_URL }}" \
            -var="secret_key=${{ secrets.SECRET_KEY }}" \
            -var="stripe_secret_key=${{ secrets.STRIPE_SECRET_KEY }}" \
            -var="stripe_publishable_key=${{ secrets.STRIPE_PUBLISHABLE_KEY }}" \
            -var="stripe_webhook_secret=${{ secrets.STRIPE_WEBHOOK_SECRET }}"

      # ────────────────────────────────────────────────────────────
      # OUTPUTS (after apply, not after destroy)
      # ────────────────────────────────────────────────────────────
      - name: Show Terraform Outputs
        if: steps.action.outputs.action == 'apply'
        run: terraform output
        continue-on-error: true
