name: Terraform Infrastructure

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform (apply/destroy)'
        required: true
        default: 'apply'
        type: choice
        options:
        - apply
        - destroy

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'Apply' }}
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action != 'destroy'
        env:
          TF_VAR_mongodb_url: ${{ secrets.MONGODB_URL }}
          TF_VAR_stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          TF_VAR_stripe_publishable_key: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          TF_VAR_stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
          TF_VAR_backend_repo_url: "https://github.com/${{ github.repository }}.git"
          TF_VAR_frontend_bucket_name: "helena-adventure-frontend-umer-atu"
          TF_VAR_public_key: ${{ secrets.TF_VAR_public_key }}
        run: terraform plan -input=false

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event.inputs.action != 'destroy'
        env:
          TF_VAR_mongodb_url: ${{ secrets.MONGODB_URL }}
          TF_VAR_stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          TF_VAR_stripe_publishable_key: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          TF_VAR_stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
          TF_VAR_backend_repo_url: "https://github.com/${{ github.repository }}.git"
          TF_VAR_frontend_bucket_name: "helena-adventure-frontend-umer-atu"
          TF_VAR_public_key: ${{ secrets.TF_VAR_public_key }}
        run: terraform apply -auto-approve -input=false

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        env:
          TF_VAR_mongodb_url: ${{ secrets.MONGODB_URL }}
          TF_VAR_stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
          TF_VAR_stripe_publishable_key: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          TF_VAR_stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
          TF_VAR_backend_repo_url: "https://github.com/${{ github.repository }}.git"
          TF_VAR_frontend_bucket_name: "helena-adventure-frontend-umer-atu"
          # Public key not strictly needed for destroy, but good practice to keep env vars consistent
          TF_VAR_public_key: ${{ secrets.TF_VAR_public_key }}
        run: terraform destroy -auto-approve -input=false
