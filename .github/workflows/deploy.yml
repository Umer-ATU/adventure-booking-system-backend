name: Deploy to EC2

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'terraform/**'
      - '**.md'
  workflow_dispatch:

jobs:
  quality:
    name: Test & Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          echo "MONGODB_URL=mongodb://localhost:27017/testdb" > .env.dev
          echo "SECRET_KEY=supersecretkeyfortesting" >> .env.dev
          pytest --cov=app --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}
          ENVIRONMENT: dev

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security:
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for SECRETS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified

  build_and_push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [quality, security]
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
      registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: helena-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          # Save URI for next steps
          echo "IMAGE_URI=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_URI }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker image to Amazon ECR
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: helena-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          echo "image_uri=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  performance:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull image and run temporary container
        env:
          IMAGE_URI: ${{ needs.build_and_push.outputs.image_uri }}
        run: |
          docker network create app-network
          
          # Start Redis container
          docker run -d --name redis --network app-network redis:latest
          
          # Sleep to allow service start
          sleep 5
          
          # Start App
          docker run -d --name backend --network app-network -p 8000:8000 \
            -e MONGODB_URL="${{ secrets.MONGODB_URL }}" \
            -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            -e REDIS_URL="redis://redis:6379" \
            $IMAGE_URI
            
          # Wait for app
          sleep 10
          curl -f http://localhost:8000/docs || exit 1

      - name: Run k6 load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/load_test.js
          flags: --vus 10 --duration 10s

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: performance
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get EC2 Public IP
        id: ec2
        run: |
          IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=helena-backend" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "EC2_IP=$IP" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_URI: ${{ needs.build_and_push.outputs.image_uri }}
          REGISTRY: ${{ needs.build_and_push.outputs.registry }}
        with:
          host: ${{ env.EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: IMAGE_URI,REGISTRY
          script: |
            # Login to ECR on EC2
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $REGISTRY
            
            # Create minimal docker-compose.yml on EC2
            cat << 'EOF' > ~/docker-compose.yml
            version: '3.8'
            services:
              redis:
                image: redis:latest
                container_name: redis
                restart: always
                networks:
                  - app-network

              backend:
                image: ${IMAGE_URI}
                container_name: backend
                restart: always
                ports:
                  - "80:8000"
                environment:
                  - MONGODB_URL=${MONGODB_URL}
                  - SECRET_KEY=${SECRET_KEY}
                  - REDIS_URL=redis://redis:6379
                  - PROJECT_NAME=Helena Adventure (Prod)
                  - DATABASE_NAME=booking_system
                depends_on:
                  - redis
                networks:
                  - app-network

            networks:
              app-network:
                driver: bridge
            EOF
            
            # Export secrets for docker-compose
            export MONGODB_URL="${{ secrets.MONGODB_URL }}"
            export SECRET_KEY="${{ secrets.SECRET_KEY }}"
            export IMAGE_URI=$IMAGE_URI
            
            # Pull new image and restart services
            docker-compose pull backend
            docker-compose up -d
            
            # Prune old images
            docker image prune -a -f

  post_deploy:
    name: Post Deploy Tasks
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Trigger Lambda Function
        run: |
          aws lambda invoke --function-name PostDeployNotifications \
            --payload '{"status": "success", "service": "backend"}' \
            response.json
          cat response.json
