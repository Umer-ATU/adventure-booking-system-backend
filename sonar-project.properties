# SonarCloud Configuration
# This file configures SonarCloud analysis for the project

# Required: Your SonarCloud organization and project key
sonar.organization=YOUR_SONARCLOUD_ORG
sonar.projectKey=YOUR_PROJECT_KEY

# Project metadata
sonar.projectName=Adventure Booking System Backend
sonar.projectVersion=1.0

# Source code location
sonar.sources=app
sonar.tests=tests

# Python configuration
sonar.python.version=3.11

# Coverage report location (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions - files/folders to skip during analysis
sonar.exclusions=**/tests/**,**/__pycache__/**,**/migrations/**,**/*.pyc,**/venv/**,**/env/**

# Test exclusions
sonar.test.exclusions=**/tests/**

# Encoding
sonar.sourceEncoding=UTF-8
