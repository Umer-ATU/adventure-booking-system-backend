name: Deploy to EC2

on:
  push:
    branches:
      - main
  # Allows manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          # Create a fake .env.dev file for tests (required by Settings validation)
          echo "MONGODB_URL=mongodb://localhost:27017/testdb" > .env.dev
          echo "SECRET_KEY=supersecretkeyfortesting" >> .env.dev
          pytest --cov=app --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}
          ENVIRONMENT: dev

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test  # Run after tests pass
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage for SonarCloud
        run: |
          # Create a fake .env.dev file for tests (required by Settings validation)
          echo "MONGODB_URL=mongodb://localhost:27017/testdb" > .env.dev
          echo "SECRET_KEY=supersecretkeyfortesting" >> .env.dev
          pytest --cov=app --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}
          ENVIRONMENT: dev

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [test, sonarcloud]  # Deploy after tests AND SonarCloud pass
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            
            echo "🔧 Checking and installing dependencies..."
            
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "📦 Installing Docker..."
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
            fi
            
            # Install Docker Compose if not present
            if ! command -v docker-compose &> /dev/null; then
              echo "📦 Installing Docker Compose..."
              sudo apt-get install -y docker-compose
            fi
            
            # Clone repo if not present (use PAT for private repo)
            if [ ! -d ~/adventure-booking-system-backend ]; then
              echo "📥 Cloning repository..."
              cd ~
              git clone https://${{ secrets.GH_PAT }}@github.com/Umer-ATU/adventure-booking-system-backend.git
            fi
            
            cd ~/adventure-booking-system-backend
            
            # Configure git to use PAT for this repo
            git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/Umer-ATU/adventure-booking-system-backend.git
            
            # Pull latest changes
            echo "📥 Pulling latest changes..."
            git pull origin main
            
            # Create .env.prod file from secrets
            echo "🔐 Creating environment file..."
            cat > .env.prod << EOF
            MONGODB_URL=${{ secrets.MONGODB_URL }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            MONGODB_DB_NAME=booking_system
            EOF
            
            # Stop existing container (use sudo for first run)
            echo "🛑 Stopping existing containers..."
            sudo docker-compose down || true
            
            # Rebuild and start
            echo "🚀 Building and starting containers..."
            sudo docker-compose up -d --build
            
            # Clean up old images
            sudo docker image prune -f
            
            echo "✅ Deployment completed successfully!"
