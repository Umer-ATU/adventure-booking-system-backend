name: Terraform Infrastructure

on:
  # Manual trigger only — apply, plan-only, or destroy
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - plan-only
          - destroy

env:
  # All Terraform variables that don't have defaults in variables.tf
  # backend_repo_url is not a secret, so we hardcode it here
  TF_VAR_public_key: ${{ secrets.EC2_PUBLIC_KEY }}
  TF_VAR_backend_repo_url: "https://github.com/Umer-ATU/adventure-booking-system-backend.git"
  TF_VAR_mongodb_url: ${{ secrets.MONGODB_URL }}
  TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
  TF_VAR_stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
  TF_VAR_stripe_publishable_key: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
  TF_VAR_stripe_webhook_secret: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
  
  # Custom Domain Config
  TF_VAR_custom_domain_name: "adventure.umer-karachiwala.com"
  TF_VAR_api_custom_domain_name: "api.adventure.umer-karachiwala.com"
  TF_VAR_acm_certificate_arn: "arn:aws:acm:us-east-1:347254676058:certificate/36971970-1c72-4249-af6f-420ca5fefc64"

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'apply' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.7'

      - name: Determine action
        id: action
        run: |
          ACTION="${{ github.event.inputs.action || 'apply' }}"
          echo "action=$ACTION" >> $GITHUB_OUTPUT
          echo "🎯 Terraform action: $ACTION"

      - name: Terraform Init
        run: terraform init

      # ── PLAN (for apply or plan-only) ──────────────────────────
      - name: Terraform Plan
        if: steps.action.outputs.action != 'destroy'
        run: terraform plan -out=tfplan

      # ── APPLY ──────────────────────────────────────────────────
      - name: Terraform Apply
        if: steps.action.outputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      # ── DESTROY PLAN ───────────────────────────────────────────
      - name: Terraform Destroy Plan
        if: steps.action.outputs.action == 'destroy'
        run: terraform plan -destroy

      # ── DESTROY ────────────────────────────────────────────────
      - name: Terraform Destroy
        if: steps.action.outputs.action == 'destroy'
        run: terraform destroy -auto-approve

      # ── OUTPUTS ────────────────────────────────────────────────
      - name: Show Terraform Outputs
        if: steps.action.outputs.action == 'apply'
        run: terraform output
        continue-on-error: true
