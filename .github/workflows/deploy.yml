name: Deploy to EC2

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'terraform/**'
      - '**.md'
  # Allows manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  quality:
    name: Test & Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          # Create a fake .env.dev file for tests (required by Settings validation)
          echo "MONGODB_URL=mongodb://localhost:27017/testdb" > .env.dev
          echo "SECRET_KEY=supersecretkeyfortesting" >> .env.dev
          pytest --cov=app --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}
          ENVIRONMENT: dev

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: quality  # Deploy only if quality check passes
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: helena-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          echo "IMAGE_URI=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Get EC2 Public IP
        id: ec2
        run: |
          IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=helena-backend" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "EC2_IP=$IP" >> $GITHUB_ENV
          echo "Found EC2 IP: $IP"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Login to ECR on EC2
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            # Pull new image
            docker pull ${{ env.IMAGE_URI }}
            
            # Create network if needed
            docker network create app-network || true
            
            # Stop keys if running
            docker stop backend || true
            docker rm backend || true
            
            # Run new container
            docker run -d \
              --name backend \
              --network app-network \
              -p 80:8000 \
              -e MONGODB_URL="${{ secrets.MONGODB_URL }}" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e PROJECT_NAME="Helena Adventure (Prod)" \
              -e DATABASE_NAME="booking_system" \
              --restart unless-stopped \
              ${{ env.IMAGE_URI }}
            
            # Prune old images
            docker image prune -a -f
            
            echo "✅ Backend deployed successfully from ECR!"
