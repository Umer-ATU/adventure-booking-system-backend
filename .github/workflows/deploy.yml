name: Deploy to EC2

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'terraform/**'
      - '**.md'
  workflow_dispatch:

jobs:
  quality:
    name: Test & Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          echo "MONGODB_URL=mongodb://localhost:27017/testdb" > .env.dev
          echo "SECRET_KEY=supersecretkeyfortesting" >> .env.dev
          pytest --cov=app --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}
          ENVIRONMENT: dev

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security:
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for SECRETS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified

  build_and_push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [quality, security]
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
      registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: helena-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          # Save URI for next steps
          echo "IMAGE_URI=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_URI }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker image to Amazon ECR
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: helena-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          echo "image_uri=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  performance:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull image and run temporary container
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: helena-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          echo "Using image: $IMAGE_URI"
          
          docker network create app-network
          
          # Start Redis container
          docker run -d --name redis --network app-network redis:latest
          
          # Sleep to allow service start
          sleep 5
          
          # Start App
          docker run -d --name backend --network app-network -p 8000:8000 \
            -e MONGODB_URL="${{ secrets.MONGODB_URL }}" \
            -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            -e REDIS_URL="redis://redis:6379" \
            "$IMAGE_URI"
            
          # Wait for app
          sleep 10
          curl -f http://localhost:8000/docs || exit 1

      - name: Set up Python for Locust
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install and Run Locust load test
        run: |
          python -m pip install --upgrade pip
          pip install locust
          locust -f tests/locustfile.py --headless -u 10 -r 2 --run-time 10s --host http://localhost:8000

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [performance, build_and_push]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get EC2 Public IP
        id: ec2
        run: |
          IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=helena-backend" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "EC2_IP=$IP" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_URI: ${{ needs.build_and_push.outputs.image_uri }}
          REGISTRY: ${{ needs.build_and_push.outputs.registry }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        with:
          host: ${{ env.EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: IMAGE_URI,REGISTRY,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION,MONGODB_URL,SECRET_KEY
          script: |
            # Login to ECR on EC2
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $REGISTRY

            # Write compose template (escaped EOF so bash doesn't touch it yet)
            cat << 'EOF' > ~/docker-compose.yml
            services:
              redis:
                image: redis:latest
                container_name: redis
                restart: always
                networks:
                  - app-network

              backend:
                image: __IMAGE_URI__
                container_name: backend
                restart: always
                ports:
                  - "80:8000"
                environment:
                  - MONGODB_URL=__MONGODB_URL__
                  - SECRET_KEY=__SECRET_KEY__
                  - REDIS_URL=redis://redis:6379
                  - PROJECT_NAME=Helena Adventure (Prod)
                  - DATABASE_NAME=booking_system
                depends_on:
                  - redis
                networks:
                  - app-network

            networks:
              app-network:
                driver: bridge
            EOF

            # Substitute placeholders with actual environment variables passed via SSH action
            sed -i "s|__IMAGE_URI__|$IMAGE_URI|g" ~/docker-compose.yml
            sed -i "s|__MONGODB_URL__|$MONGODB_URL|g" ~/docker-compose.yml
            sed -i "s|__SECRET_KEY__|$SECRET_KEY|g" ~/docker-compose.yml

            docker-compose pull backend
            docker-compose up -d
            docker image prune -a -f